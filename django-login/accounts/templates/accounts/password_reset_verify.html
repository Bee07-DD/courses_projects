<!DOCTYPE html>
{% extends 'accounts/base.html' %}
{% load static %}
{% block title %}Verify Code — Lushlyrics{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <span class="icon">📩</span>
            <h2>Check your email</h2>
            <p>Enter the 6-digit code we sent you</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="field-group">
                <label>Code</label>
                <input type="text" name="code" placeholder="______" maxlength="6" required style="text-align:center; letter-spacing: 8px; font-size: 1.2rem;">
            </div>
            <button type="submit" class="btn-auth">Verify →</button>
        </form>
        {% if error %}<ul class="errorlist"><li>{{ error }}</li></ul>{% endif %}
    </div>
</div>
{% endblock %}
