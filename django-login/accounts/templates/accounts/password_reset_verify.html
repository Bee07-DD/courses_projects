<!DOCTYPE html>
{% extends 'accounts/base.html' %}
{% block title %}Verify Code{% endblock %}
{% block content %}
    <h2 class="mb-4 text-center">Enter your code</h2>
    <p class="text-center text-muted">Check your email for the 6-digit code.</p>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <input type="text" name="code" class="form-control text-center" placeholder="______" maxlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Verify</button>
    </form>
    {% if error %}<p class="text-danger mt-2">{{ error }}</p>{% endif %}
{% endblock %}
