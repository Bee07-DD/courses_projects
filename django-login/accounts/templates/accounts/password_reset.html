<!DOCTYPE html>
{% extends 'accounts/base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
    <h2 class="mb-4 text-center">Forgot your password?</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
        </div>
        <button type="submit" class="btn btn-warning w-100">Send code</button>
    </form>
    {% if error %}<p class="text-danger mt-2">{{ error }}</p>{% endif %}
    <hr>
    <p class="text-center"><a href="{% url 'login' %}">Back to login</a></p>
{% endblock %}
