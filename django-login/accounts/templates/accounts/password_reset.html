<!DOCTYPE html>
{% extends 'accounts/base.html' %}
{% load static %}
{% block title %}Reset Password — Lushlyrics{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <span class="icon">🔑</span>
            <h2>Forgot password?</h2>
            <p>We'll send you a reset code</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="field-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <button type="submit" class="btn-auth">Send code →</button>
        </form>
        {% if error %}<p class="errorlist"><li>{{ error }}</li></p>{% endif %}
        <div class="divider"><span>or</span></div>
        <div class="auth-links">
            <p><a href="{% url 'login' %}">Back to login</a></p>
        </div>
    </div>
</div>
{% endblock %}
