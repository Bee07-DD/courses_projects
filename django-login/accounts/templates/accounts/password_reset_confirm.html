<!DOCTYPE html>
{% extends 'accounts/base.html' %}
{% load static %}
{% block title %}New Password — Lushlyrics{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <span class="icon">🔒</span>
            <h2>New password</h2>
            <p>Choose a strong password</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="field-group">
                <label>New password</label>
                <input type="password" name="password1" placeholder="New password" required>
            </div>
            <div class="field-group">
                <label>Confirm password</label>
                <input type="password" name="password2" placeholder="Confirm password" required>
            </div>
            <button type="submit" class="btn-auth">Change password →</button>
        </form>
        {% if error %}<ul class="errorlist"><li>{{ error }}</li></ul>{% endif %}
    </div>
</div>
{% endblock %}
