<!DOCTYPE html>
{% extends 'accounts/base.html' %}
{% block title %}New Password{% endblock %}
{% block content %}
    <h2 class="mb-4 text-center">Set a new password</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <input type="password" name="password1" class="form-control" placeholder="New password" required>
        </div>
        <div class="mb-3">
            <input type="password" name="password2" class="form-control" placeholder="Confirm password" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Change password</button>
    </form>
    {% if error %}<p class="text-danger mt-2">{{ error }}</p>{% endif %}
{% endblock %}
